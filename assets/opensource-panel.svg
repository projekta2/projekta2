<svg xmlns="http://www.w3.org/2000/svg" width="830" height="130" viewBox="0 0 830 130">
  <!-- Left card: PR Review Canvas -->
  <rect x="0" y="0" width="405" height="130" rx="12" fill="#0d1117"/>
  <rect x="0" y="0" width="405" height="130" rx="12" fill="none" stroke="#94b715" stroke-width="1" opacity="0.4"/>
  <rect x="0" y="0" width="405" height="3" rx="2" fill="#94b715" opacity="0.8"/>
  <!-- Icon + title -->
  <text x="16" y="36" font-size="18">🎨</text>
  <text x="44" y="36" font-family="'Courier New',Courier,monospace" font-size="14" font-weight="700" fill="#f5f5f0">PR Review Canvas</text>
  <!-- MIT badge -->
  <rect x="44" y="42" width="34" height="16" rx="3" fill="#94b715" opacity="0.2"/>
  <text x="48" y="54" font-family="'Courier New',Courier,monospace" font-size="10" fill="#94b715">MIT</text>
  <rect x="84" y="42" width="56" height="16" rx="3" fill="#14588e" opacity="0.2"/>
  <text x="88" y="54" font-family="'Courier New',Courier,monospace" font-size="10" fill="#14588e">open source</text>
  <!-- Description -->
  <text x="16" y="78" font-family="-apple-system,sans-serif" font-size="12" fill="#8b949e">51-item interactive checklist · templates ·</text>
  <text x="16" y="94" font-family="-apple-system,sans-serif" font-size="12" fill="#8b949e">guides · examples. Free, forever.</text>
  <!-- CTA -->
  <text x="16" y="118" font-family="'Courier New',Courier,monospace" font-size="11" fill="#94b715">▸ Try live  ▸ 9 issues open  ▸ contributions welcome</text>

  <!-- Right card: Build Logs -->
  <rect x="420" y="0" width="410" height="130" rx="12" fill="#0d1117"/>
  <rect x="420" y="0" width="410" height="130" rx="12" fill="none" stroke="#14588e" stroke-width="1" opacity="0.4"/>
  <rect x="420" y="0" width="410" height="3" rx="2" fill="#14588e" opacity="0.8"/>
  <!-- Icon + title -->
  <text x="436" y="36" font-size="18">📋</text>
  <text x="464" y="36" font-family="'Courier New',Courier,monospace" font-size="14" font-weight="700" fill="#f5f5f0">Build Logs</text>
  <rect x="464" y="42" width="82" height="16" rx="3" fill="#14588e" opacity="0.2"/>
  <text x="468" y="54" font-family="'Courier New',Courier,monospace" font-size="10" fill="#14588e">engineering journal</text>
  <!-- Description -->
  <text x="436" y="78" font-family="-apple-system,sans-serif" font-size="12" fill="#8b949e">Real trade-offs from shipping 3 Chrome</text>
  <text x="436" y="94" font-family="-apple-system,sans-serif" font-size="12" fill="#8b949e">extensions solo. No theory — just decisions.</text>
  <!-- CTA + Review Swap -->
  <text x="436" y="118" font-family="'Courier New',Courier,monospace" font-size="11" fill="#14588e">▸ Read logs  ▸ Join the Review Swap (June 2026)</text>
</svg>
