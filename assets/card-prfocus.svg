<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <rect width="400" height="180" rx="12" fill="#0d1117"/>
  <rect width="400" height="180" rx="12" fill="none" stroke="#94b715" stroke-width="1.5" opacity="0.6"/>
  <rect width="400" height="3" rx="2" fill="url(#pf-grad)"/>
  <defs>
    <linearGradient id="pf-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94b715"/>
      <stop offset="100%" style="stop-color:#14588e"/>
    </linearGradient>
  </defs>
  <!-- Animated score indicator -->
  <circle cx="356" cy="32" r="26" fill="#0d1117" stroke="#94b715" stroke-width="1.5"/>
  <text x="356" y="28" font-family="'Courier New',Courier,monospace" font-size="11" fill="#94b715" text-anchor="middle" font-weight="700">risk</text>
  <text x="356" y="42" font-family="'Courier New',Courier,monospace" font-size="14" fill="#94b715" text-anchor="middle" font-weight="700">73</text>
  <!-- Name -->
  <text x="20" y="38" font-family="'Courier New',Courier,monospace" font-size="16" font-weight="700" fill="#f5f5f0">PR Focus Pro</text>
  <!-- Badges -->
  <rect x="20" y="44" width="82" height="18" rx="4" fill="#94b715" opacity="0.15"/>
  <text x="26" y="57" font-family="'Courier New',Courier,monospace" font-size="11" fill="#94b715">$9.50 one-time</text>
  <rect x="110" y="44" width="52" height="18" rx="4" fill="#14588e" opacity="0.25"/>
  <text x="116" y="57" font-family="'Courier New',Courier,monospace" font-size="11" fill="#14588e">freemium</text>
  <!-- Description -->
  <text x="20" y="88" font-family="-apple-system,sans-serif" font-size="12" fill="#8b949e">AI-powered PR triage for GitHub. Scores, ranks,</text>
  <text x="20" y="104" font-family="-apple-system,sans-serif" font-size="12" fill="#8b949e">and summarizes every PR. 100% local (BYOK).</text>
  <!-- Features -->
  <text x="20" y="128" font-family="'Courier New',Courier,monospace" font-size="11" fill="#94b715">▸</text>
  <text x="34" y="128" font-family="-apple-system,sans-serif" font-size="11" fill="#6b7280">Hybrid risk score 0–100 · AI summaries · drafts</text>
  <text x="20" y="146" font-family="'Courier New',Courier,monospace" font-size="11" fill="#94b715">▸</text>
  <text x="34" y="146" font-family="-apple-system,sans-serif" font-size="11" fill="#6b7280">OpenAI · Groq · Mistral · Ollama — your keys</text>
  <text x="20" y="168" font-family="-apple-system,sans-serif" font-size="10" fill="#354650" font-style="italic">Built for developers managing multiple repos</text>
</svg>
