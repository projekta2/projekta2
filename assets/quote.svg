<svg xmlns="http://www.w3.org/2000/svg" width="830" height="90" viewBox="0 0 830 90">
  <rect width="830" height="90" rx="10" fill="#0a0c10"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="90" rx="2" fill="url(#q-grad)"/>
  <defs>
    <linearGradient id="q-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14588e"/>
      <stop offset="100%" style="stop-color:#94b715"/>
    </linearGradient>
  </defs>
  <!-- Quote marks -->
  <text x="24" y="42" font-family="Georgia,serif" font-size="52" fill="#14588e" opacity="0.4">"</text>
  <!-- Quote text -->
  <text x="60" y="34" font-family="Georgia,serif" font-size="15" fill="#f5f5f0" font-style="italic">Most tools are built to impress on a demo.</text>
  <text x="60" y="56" font-family="Georgia,serif" font-size="15" fill="#f5f5f0" font-style="italic">I build for the <tspan font-weight="bold" fill="#94b715">third week of use</tspan> — when the novelty is gone and all</text>
  <text x="60" y="76" font-family="Georgia,serif" font-size="15" fill="#f5f5f0" font-style="italic">that's left is whether it actually <tspan font-weight="bold" fill="#94b715">saves you time</tspan>.</text>
</svg>
