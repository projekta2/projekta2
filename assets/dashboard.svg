<svg xmlns="http://www.w3.org/2000/svg" width="830" height="64" viewBox="0 0 830 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c10"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="border-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14588e;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#94b715;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#14588e;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="830" height="64" rx="12" fill="url(#bg)"/>
  <!-- Gradient border -->
  <rect width="830" height="64" rx="12" fill="none" stroke="url(#border-g)" stroke-width="1"/>
  <!-- Top accent line -->
  <rect x="1" y="1" width="828" height="2" rx="1" fill="url(#border-g)" opacity="0.6"/>

  <!-- LIVE indicator -->
  <circle cx="22" cy="32" r="5" fill="#94b715">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="22" cy="32" r="9" fill="none" stroke="#94b715" stroke-width="1" opacity="0">
    <animate attributeName="r" values="5;13;5" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="36" y="27" font-family="'Courier New',Courier,monospace" font-size="9" fill="#94b715" letter-spacing="1.5" font-weight="700">LIVE</text>
  <text x="36" y="40" font-family="'Courier New',Courier,monospace" font-size="9" fill="#354650">STATUS</text>

  <!-- Vertical separator -->
  <line x1="78" y1="14" x2="78" y2="50" stroke="#1e2a30" stroke-width="1"/>

  <!-- Stat: Extensions -->
  <text x="96" y="26" font-family="'Courier New',Courier,monospace" font-size="18" font-weight="700" fill="#f5f5f0">3</text>
  <text x="96" y="40" font-family="'Courier New',Courier,monospace" font-size="9" fill="#6b7280" letter-spacing="0.5">EXTENSIONS IN PROD</text>

  <line x1="220" y1="14" x2="220" y2="50" stroke="#1e2a30" stroke-width="1"/>

  <!-- Stat: Articles -->
  <text x="238" y="26" font-family="'Courier New',Courier,monospace" font-size="18" font-weight="700" fill="#f5f5f0">7</text>
  <text x="238" y="40" font-family="'Courier New',Courier,monospace" font-size="9" fill="#6b7280" letter-spacing="0.5">DEV.TO ARTICLES</text>

  <line x1="360" y1="14" x2="360" y2="50" stroke="#1e2a30" stroke-width="1"/>

  <!-- Stat: Open Source -->
  <text x="378" y="26" font-family="'Courier New',Courier,monospace" font-size="18" font-weight="700" fill="#f5f5f0">2</text>
  <text x="378" y="40" font-family="'Courier New',Courier,monospace" font-size="9" fill="#6b7280" letter-spacing="0.5">OPEN SOURCE REPOS</text>

  <line x1="498" y1="14" x2="498" y2="50" stroke="#1e2a30" stroke-width="1"/>

  <!-- Stat: No subscriptions -->
  <text x="516" y="26" font-family="'Courier New',Courier,monospace" font-size="18" font-weight="700" fill="#94b715">0</text>
  <text x="516" y="40" font-family="'Courier New',Courier,monospace" font-size="9" fill="#6b7280" letter-spacing="0.5">SUBSCRIPTIONS SOLD</text>

  <line x1="638" y1="14" x2="638" y2="50" stroke="#1e2a30" stroke-width="1"/>

  <!-- Right: location + build in public -->
  <text x="656" y="26" font-family="'Courier New',Courier,monospace" font-size="11" fill="#14588e">projekta2</text>
  <text x="656" y="40" font-family="'Courier New',Courier,monospace" font-size="9" fill="#354650">Girona, ES · May 2026→</text>
</svg>
